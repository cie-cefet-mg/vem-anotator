<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Annotation{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
    </head>
<body>
{% if site_access_active and site_access_in %}
<div style="background:#f5f5f5; padding:8px 16px; text-align:right; border-bottom:1px solid #e0e0e0;">
    <form method="post" action="{% url 'app_projeto:site_access_logout_en' %}" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="btn-voltar" style="padding:6px 14px; font-size:0.85rem; border:none; cursor:pointer;">Exit annotator access</button>
    </form>
</div>
{% endif %}
{% block content %}
{% endblock %}
</body>
</html>
